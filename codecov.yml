codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "50...100"
  status:
    project:
      default:
        target: auto
        threshold: 2%
      frontend:
        flags:
          - frontend
        target: 70%
      rust:
        flags:
          - rust
        target: 70%
    patch:
      default:
        target: 70%

flags:
  frontend:
    paths:
      - soroban-client
  rust:
    paths:
      - soroban-contract

comment:
  layout: "reach,diff,flags,tree"
  require_changes: true
